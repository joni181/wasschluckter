{% extends "base.html" %}

{% block title %}New entry · wasschluckter{% endblock %}

{% block content %}
<section class="page-section">
  <header class="section-header">
    <h1 class="section-header__title">New entry</h1>
  </header>

  <form class="entry-form" id="entry-form" novalidate>
    <label class="field">
      <span class="field__label">Fuel station</span>
      <input class="field__input" type="text" name="station_name" autocomplete="off" required>
      <span class="field__error" data-error-for="station_name"></span>
    </label>

    <div class="field-row field-row--location">
      <label class="field field--grow">
        <span class="field__label">City</span>
        <input class="field__input" type="text" name="city" autocomplete="off" required>
        <span class="field__error" data-error-for="city"></span>
      </label>
      <label class="field field--country">
        <span class="field__label">Country</span>
        <select class="field__input field__select" name="country" required>
          {% for c in countries %}
          <option value="{{ c.code }}" {% if c.code == 'DE' %}selected{% endif %}>{{ c.name }} [{{ c.code }}]</option>
          {% endfor %}
        </select>
        <span class="field__error" data-error-for="country"></span>
      </label>
    </div>

    <div class="field-row field-row--numbers">
      <label class="field field--grow">
        <span class="field__label">Liters</span>
        <input class="field__input" type="number" name="liters" inputmode="decimal" step="0.01" min="0.01" required>
        <span class="field__error" data-error-for="liters"></span>
      </label>
      <label class="field field--grow">
        <span class="field__label">Price (€)</span>
        <input class="field__input" type="number" name="amount_eur" inputmode="decimal" step="0.01" min="0.01" required>
        <span class="field__error" data-error-for="amount_eur"></span>
      </label>
    </div>

    <div class="field-row field-row--meta">
      <label class="field field--grow">
        <span class="field__label">Fuel type</span>
        <select class="field__input field__select" name="fuel_type" required>
          {% for ft in fuel_types %}
          <option value="{{ ft }}" {% if ft == 'E10' %}selected{% endif %}>{{ ft }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field field--grow">
        <span class="field__label">Full tank</span>
        <select class="field__input field__select" name="is_full_tank">
          <option value="unknown" selected>Unknown</option>
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>
      </label>
    </div>

    <label class="field">
      <span class="field__label">Date</span>
      <input class="field__input" type="date" name="entry_date" value="{{ today }}" required>
      <span class="field__error" data-error-for="entry_date"></span>
    </label>

    <label class="field">
      <span class="field__label">Notes (optional)</span>
      <input class="field__input" type="text" name="notes" autocomplete="off">
    </label>

    <div class="form-status" data-form-status hidden></div>

    <div class="form-actions">
      <button class="button button--danger button--equal" type="button" data-action="cancel">Cancel</button>
      <button class="button button--camera" type="button" data-action="camera" aria-label="Scan a receipt (not implemented yet)">
        <svg aria-hidden="true"><use href="#icon-camera"/></svg>
      </button>
      <button class="button button--success button--equal" type="submit">Save</button>
    </div>

    <input type="file" accept="image/*" capture="environment" data-camera-input hidden>
  </form>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='new-entry.js') }}" defer></script>
{% endblock %}
