<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <meta name="color-scheme" content="dark light">

  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="wasschluckter">
  <link rel="apple-touch-icon" href="{{ url_for('static', path='icons/apple-touch-icon.png') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='icons/icon.svg') }}">
  <link rel="manifest" href="{{ url_for('static', path='manifest.webmanifest') }}">

  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">

  <title>{% block title %}wasschluckter{% endblock %}</title>
</head>
<body class="page page--{{ active_page or 'main' }}">

  {% include "_icons.html" %}

  <div class="app-shell">
    <aside class="app-sidebar" aria-label="Primary">
      <a class="app-sidebar__brand" href="/">
        <svg class="app-sidebar__logo" aria-hidden="true"><use href="#icon-fuel"/></svg>
        <span>wasschluckter</span>
      </a>
      <nav class="app-sidebar__nav">
        <a class="nav-item {% if active_page == 'analysis' %}nav-item--active{% endif %}" href="/analysis">
          <svg class="nav-item__icon" aria-hidden="true"><use href="#icon-chart"/></svg>
          <span class="nav-item__label">Analysis</span>
        </a>
        <a class="nav-item {% if active_page == 'new' %}nav-item--active{% endif %}" href="/new">
          <svg class="nav-item__icon" aria-hidden="true"><use href="#icon-plus"/></svg>
          <span class="nav-item__label">New entry</span>
        </a>
        <a class="nav-item {% if active_page == 'main' %}nav-item--active{% endif %}" href="/">
          <svg class="nav-item__icon" aria-hidden="true"><use href="#icon-home"/></svg>
          <span class="nav-item__label">Overview</span>
        </a>
      </nav>
      <a class="nav-item nav-item--user" href="#" aria-label="User">
        <svg class="nav-item__icon" aria-hidden="true"><use href="#icon-user"/></svg>
        <span class="nav-item__label">Account</span>
      </a>
    </aside>

    <main class="app-main">
      {% block content %}{% endblock %}
    </main>

    <nav class="tab-bar" aria-label="Primary">
      <a class="tab-bar__item {% if active_page == 'analysis' %}tab-bar__item--active{% endif %}" href="/analysis" aria-label="Analysis">
        <svg class="tab-bar__icon" aria-hidden="true"><use href="#icon-chart"/></svg>
      </a>
      <a class="tab-bar__item tab-bar__item--primary {% if active_page == 'new' %}tab-bar__item--active{% endif %}" href="/new" aria-label="New entry">
        <svg class="tab-bar__icon" aria-hidden="true"><use href="#icon-plus"/></svg>
      </a>
      <a class="tab-bar__item {% if active_page == 'user' %}tab-bar__item--active{% endif %}" href="#" aria-label="Account">
        <svg class="tab-bar__icon" aria-hidden="true"><use href="#icon-user"/></svg>
      </a>
    </nav>
  </div>

  {% block scripts %}{% endblock %}
  <script src="{{ url_for('static', path='app.js') }}" defer></script>
</body>
</html>
